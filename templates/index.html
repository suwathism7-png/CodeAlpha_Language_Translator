<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl p-6 md:p-8">
        <h1 class="text-3xl font-bold text-slate-800 mb-6 text-center">AI Language Translation Tool</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col">
                <label class="block text-sm font-medium text-slate-700 mb-2">Source Language</label>
                <select id="sourceLanguage" class="block w-full bg-slate-100 border border-slate-300 rounded-lg px-3 py-2 text-slate-700 focus:outline-none mb-3">
                    <option value="auto">Detect Language (Auto)</option>
                    {% for code, name in languages.items() %}
                    <option value="{{ code }}">{{ name }}</option>
                    {% endfor %}
                </select>
                <textarea id="sourceText" rows="6" placeholder="Type text here..." class="w-full border border-slate-300 rounded-lg p-3 text-slate-800 focus:outline-none resize-none"></textarea>
            </div>
            <div class="flex flex-col relative">
                <label class="block text-sm font-medium text-slate-700 mb-2">Target Language</label>
                <select id="targetLanguage" class="block w-full bg-slate-100 border border-slate-300 rounded-lg px-3 py-2 text-slate-700 focus:outline-none mb-3">
                    {% for code, name in languages.items() %}
                    <option value="{{ code }}" {% if code == 'es' %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>
                <div class="relative flex-grow">
                    <textarea id="targetText" rows="6" readonly placeholder="Translation will appear here..." class="w-full border border-slate-300 bg-slate-50 rounded-lg p-3 text-slate-800 resize-none h-full focus:outline-none"></textarea>
                    <button id="copyBtn" class="absolute bottom-3 right-3 bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1 rounded text-xs font-semibold">Copy</button>
                </div>
            </div>
        </div>
        <div class="mt-6 flex justify-center">
            <button id="translateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl shadow-md">Translate Text</button>
        </div>
    </div>
    <script>
        document.getElementById('translateBtn').addEventListener('click', async () => {
            const text = document.getElementById('sourceText').value;
            const source = document.getElementById('sourceLanguage').value;
            const target = document.getElementById('targetLanguage').value;
            const targetTextArea = document.getElementById('targetText');
            if (!text.trim()) return;
            targetTextArea.value = "Translating...";
            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, source, target })
                });
                const data = await response.json();
                if (data.translated_text) {
                    targetTextArea.value = data.translated_text;
                } else {
                    targetTextArea.value = "Error: " + data.error;
                }
            } catch (error) {
                targetTextArea.value = "Failed to establish communication with the backend server.";
            }
        });
        document.getElementById('copyBtn').addEventListener('click', () => {
            const text = document.getElementById('targetText').value;
            if (text && text !== "Translating...") {
                navigator.clipboard.writeText(text);
                document.getElementById('copyBtn').innerText = "Copied!";
                setTimeout(() => document.getElementById('copyBtn').innerText = "Copy", 2000);
            }
        });
    </script>
</body>
</html>
